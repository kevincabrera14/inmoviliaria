{% load static %}
<header class="ix-header" role="banner">
    <div class="container ix-header__inner">
        <a href="{% url 'home' %}" class="ix-logo" aria-label="Inmobiliaria Medellín - Inicio">
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="ix-logo__img">
            <span class="ix-logo__text">Inmobiliaria<span class="ix-logo__em"> Medellín</span></span>
        </a>

        <button
            class="ix-menu-toggle"
            onclick="toggleMenu()"
            aria-label="Abrir menú de navegación"
            aria-expanded="false"
            aria-controls="mainNav"
        >
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="ix-nav" id="mainNav" role="navigation" aria-label="Menú principal">
            <ul class="ix-nav__list">
                <li>
                    <a href="{% url 'properties:list' %}" class="ix-nav__link">
                        <i class="bi bi-buildings"></i> Propiedades
                    </a>
                </li>
                <li class="ix-nav__dropdown">
                    <button
                        class="ix-nav__link ix-nav__link--dropdown"
                        onclick="toggleDropdown(event)"
                        aria-expanded="false"
                        aria-haspopup="true"
                    >
                        <i class="bi bi-geo-alt-fill"></i> Zonas <i class="bi bi-chevron-down ix-nav__chevron"></i>
                    </button>
                    <div class="ix-nav__dropdown-panel" role="menu">
                        {% for zone in zones %}
                        <div class="ix-nav__dropdown-group">
                            <span class="ix-nav__dropdown-title">{{ zone.name }}</span>
                            {% for muni in zone.municipalities.all %}{% if muni.slug %}
                            <a
                                href="{% url 'properties:by_municipality' muni.slug %}"
                                class="ix-nav__dropdown-item"
                                role="menuitem"
                            >{{ muni.name }}</a>
                            {% endif %}{% endfor %}
                        </div>
                        {% endfor %}
                    </div>
                </li>
            </ul>
        </nav>
    </div>
</header>

<script>
function toggleMenu() {
    const nav = document.getElementById('mainNav');
    const toggle = document.querySelector('.ix-menu-toggle');
    nav.classList.toggle('is-open');
    toggle.setAttribute('aria-expanded', nav.classList.contains('is-open'));
}

function toggleDropdown(e) {
    e.preventDefault();
    const btn = e.target.closest('.ix-nav__link--dropdown');
    const panel = btn.nextElementSibling;
    const isOpen = panel.classList.toggle('is-open');
    btn.setAttribute('aria-expanded', isOpen);
}
</script>
