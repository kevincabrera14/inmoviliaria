{% load static %}
<header class="header">
    <div class="container">
        <div class="header-inner">
            <a href="{% url 'home' %}" class="logo">
                <img src="{% static 'img/logo.png' %}" alt="Inmobiliaria Medellín" class="logo-img">
                <span>Inmobiliaria Medellín</span>
            </a>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav" id="mainNav">
                <ul class="nav-list">
                    <li><a href="{% url 'properties:list' %}" class="nav-link">Propiedades</a></li>
                    <li class="nav-dropdown-wrapper">
                        <a href="#" class="nav-link" onclick="toggleDropdown(event)">Zonas <i class="bi bi-chevron-down"></i></a>
                        <ul class="nav-dropdown">
                            {% for zone in zones %}
                            <li>
                                <span class="nav-dropdown-title">{{ zone.name }}</span>
                                {% for muni in zone.municipalities.all %}{% if muni.slug %}
                                <a href="{% url 'properties:by_municipality' muni.slug %}">{{ muni.name }}</a>
                                {% endif %}{% endfor %}
                            </li>
                            {% endfor %}
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</header>

<script>
function toggleMenu() {
    document.getElementById('mainNav').classList.toggle('active');
}

function toggleDropdown(e) {
    e.preventDefault();
    const dropdown = e.target.closest('.nav-dropdown-wrapper').querySelector('.nav-dropdown');
    dropdown.classList.toggle('active');
}
</script>

<style>
.nav-dropdown-wrapper {
    position: relative;
}

.nav-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: var(--primary-light);
    min-width: 200px;
    padding: 8px 0;
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    z-index: 1000;
}

.nav-dropdown.active {
    display: block;
}

.nav-dropdown li {
    padding: 0;
}

.nav-dropdown-title {
    display: block;
    padding: 8px 16px;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
}

.nav-dropdown a {
    display: block;
    padding: 8px 16px;
    color: white;
    font-size: 0.9rem;
}

.nav-dropdown a:hover {
    background: rgba(255,255,255,0.1);
}

@media (min-width: 576px) {
    .nav-dropdown-wrapper:hover .nav-dropdown {
        display: block;
    }
    .nav-dropdown-title {
        pointer-events: none;
    }
}
</style>
