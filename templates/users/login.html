{% extends 'base.html' %}

{% block title %}Ingresar - Inmobiliaria Medellín{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="form-card">
            <h2 style="text-align: center; margin-bottom: 24px;">Ingresar al Sistema</h2>
            {% if form.errors %}
            <div class="alert alert-error">
                Tu usuario o contraseña son incorrectos.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Usuario</label>
                    <input type="text" name="username" id="id_username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="id_password">Contraseña</label>
                    <input type="password" name="password" id="id_password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="bi bi-box-arrow-in-right"></i> Ingresar
                </button>
            </form>
            <p style="text-align: center; margin-top: 16px; font-size: 0.9rem; color: var(--text-muted);">
                ¿No tienes cuenta? Contacta al administrador
            </p>
        </div>
    </div>
</section>
{% endblock %}
